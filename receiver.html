<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC 接收端 (手机)</title>
  <style>
    body { font-family: sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    h2 { color: #00d4ff; font-size: 1.2rem; }
    video { width: 100%; max-width: 480px; border-radius: 12px; background: #000; margin: 12px 0; }
    #status { padding: 10px 16px; border-radius: 8px; background: #0f3460; margin: 8px 0; width: 90%; text-align: center; font-size: 0.95rem; }
    .connected { background: #155724 !important; color: #d4edda; }
    .waiting { background: #856404 !important; color: #fff3cd; }
  </style>
</head>
<body>
  <h2>📱 手机接收端</h2>
  <div id="status">正在连接信令服务器...</div>
  <video id="remoteVideo" autoplay playsinline controls></video>

  <script>
    const STUN = {
      iceServers: [
        { urls: 'stun:stun.qq.com:3478' },
        { urls: 'stun:stun.miwifi.com:3478' },
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
      ]
    };
    let pc = null;

    // ---- WebSocket 信令 ----
    const ws = new WebSocket(`ws://${location.host}`);

    ws.onopen = () => {
      setStatus('已连接，等待 PC 推流...', 'waiting');
      ws.send(JSON.stringify({ type: 'register', role: 'receiver' }));
    };

    ws.onmessage = async ({ data }) => {
      const msg = JSON.parse(data);

      if (msg.type === 'offer') {
        setStatus('收到推流请求，正在建立连接...', 'waiting');
        pc = new RTCPeerConnection(STUN);

        // 接收远端视频轨道
        pc.ontrack = ({ streams }) => {
          document.getElementById('remoteVideo').srcObject = streams[0];
          setStatus('正在接收视频流 ✅', 'connected');
        };

        // 转发 ICE 候选给发送方
        pc.onicecandidate = ({ candidate }) => {
          if (candidate) {
            ws.send(JSON.stringify({ type: 'ice', target: 'sender', candidate }));
          }
        };

        pc.onconnectionstatechange = () => {
          if (pc.connectionState === 'connected') setStatus('P2P 直连成功 ✅', 'connected');
          if (pc.connectionState === 'disconnected') setStatus('连接断开', '');
        };

        await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        ws.send(JSON.stringify({ type: 'answer', sdp: pc.localDescription }));

      } else if (msg.type === 'ice') {
        if (pc) await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
      }
    };

    ws.onerror = () => setStatus('无法连接服务器，请检查 IP 地址是否正确', '');
    ws.onclose = () => setStatus('信令服务器断开', '');

    function setStatus(text, cls) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = cls;
    }
  </script>
</body>
</html>
