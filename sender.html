<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>WebRTC 发送端 (PC)</title>
  <style>
    body { font-family: sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 30px; }
    h2 { color: #00d4ff; }
    video { width: 640px; max-width: 100%; border-radius: 12px; background: #000; margin: 16px 0; }
    #status { padding: 10px 20px; border-radius: 8px; background: #0f3460; margin: 8px 0; min-width: 300px; text-align: center; }
    .connected { background: #155724 !important; color: #d4edda; }
    .waiting { background: #856404 !important; color: #fff3cd; }
    button { padding: 10px 28px; border: none; border-radius: 8px; background: #00d4ff; color: #000; font-size: 16px; cursor: pointer; margin: 6px; }
    button:disabled { background: #555; color: #999; cursor: default; }
  </style>
</head>
<body>
  <h2>📷 PC 摄像头发送端</h2>
  <div id="status">正在连接信令服务器...</div>
  <video id="localVideo" autoplay muted playsinline></video>
  <div>
    <button id="startBtn" onclick="startCamera()">开启摄像头</button>
    <button id="callBtn" onclick="startCall()" disabled>开始推流</button>
  </div>

  <script>
    const STUN = {
      iceServers: [
        { urls: 'stun:stun.qq.com:3478' },          // 腾讯，国内可用
        { urls: 'stun:stun.miwifi.com:3478' },       // 小米，国内可用
        { urls: 'stun:stun.l.google.com:19302' },    // Google（备用）
        { urls: 'stun:stun1.l.google.com:19302' },
      ]
    };
    let pc = null;
    let localStream = null;

    // ---- WebSocket 信令 ----
    const ws = new WebSocket(`ws://${location.host}`);

    ws.onopen = () => {
      setStatus('已连接信令服务器，等待手机接入...', 'waiting');
      ws.send(JSON.stringify({ type: 'register', role: 'sender' }));
    };

    ws.onmessage = async ({ data }) => {
      const msg = JSON.parse(data);
      if (msg.type === 'receiver_ready') {
        setStatus('手机已就绪！点击"开始推流"', 'waiting');
        document.getElementById('callBtn').disabled = !localStream;
      } else if (msg.type === 'answer') {
        await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
        setStatus('WebRTC 连接已建立 ✅', 'connected');
      } else if (msg.type === 'ice') {
        if (pc) await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
      }
    };

    ws.onerror = () => setStatus('WebSocket 连接失败，请确认服务器已启动', '');
    ws.onclose = () => setStatus('信令服务器断开', '');

    // ---- 摄像头 ----
    async function startCamera() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('startBtn').disabled = true;
        setStatus('摄像头已开启，等待手机接入...', 'waiting');
      } catch (e) {
        setStatus('摄像头获取失败: ' + e.message, '');
      }
    }

    // ---- 发起 WebRTC 连接 ----
    async function startCall() {
      document.getElementById('callBtn').disabled = true;
      pc = new RTCPeerConnection(STUN);

      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      pc.onicecandidate = ({ candidate }) => {
        if (candidate) {
          ws.send(JSON.stringify({ type: 'ice', target: 'receiver', candidate }));
        }
      };

      pc.onconnectionstatechange = () => {
        if (pc.connectionState === 'connected') setStatus('WebRTC P2P 直连成功 ✅', 'connected');
        if (pc.connectionState === 'disconnected') setStatus('连接断开', '');
      };

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      ws.send(JSON.stringify({ type: 'offer', sdp: pc.localDescription }));
      setStatus('已发送 Offer，等待手机应答...', 'waiting');
    }

    function setStatus(text, cls) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = cls;
    }
  </script>
</body>
</html>
